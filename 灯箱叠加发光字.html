<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>软膜灯箱门头设计 · AI生成器</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft YaHei",sans-serif;}

body{
  min-height:100vh;
  background: linear-gradient(120deg,#0f2027,#2c5364,#1c1c1c);
  background-size:400% 400%;
  animation:bgMove 12s ease infinite;
  color:#fff;
}

@keyframes bgMove{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

.container{
  max-width:1200px;
  margin:auto;
  padding:30px;
}

h1{
  text-align:center;
  margin-bottom:30px;
  font-size:30px;
  background:linear-gradient(90deg,#00f5ff,#00ffcc,#66ff00);
  -webkit-background-clip:text;
  color:transparent;
}

.form-box{
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  padding:25px;
  border-radius:20px;
  backdrop-filter:blur(20px);
  box-shadow:0 0 30px rgba(0,255,255,0.1);
  margin-bottom:30px;
}

input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border:none;
  border-radius:10px;
  background:rgba(255,255,255,0.08);
  color:#fff;
  outline:none;
}

input:focus{
  box-shadow:0 0 10px #00f5ff;
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  font-size:16px;
  color:#fff;
  cursor:pointer;
  background:linear-gradient(90deg,#00f5ff,#0072ff,#00ffcc);
  background-size:200%;
  animation:btnMove 4s linear infinite;
}

@keyframes btnMove{
  0%{background-position:0%;}
  100%{background-position:200%;}
}

.result{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(520px,1fr));
  gap:20px;
}

.card{
  position:relative;
  padding:20px;
  border-radius:20px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(15px);
  border:1px solid rgba(255,255,255,0.1);
  box-shadow:0 0 20px rgba(0,255,255,0.1);
}

.card p{
  font-size:13px;
  line-height:1.6;
}

.copy-btn{
  position:absolute;
  right:15px;
  bottom:15px;
  padding:6px 14px;
  font-size:12px;
  border:none;
  border-radius:8px;
  background:linear-gradient(90deg,#ff7e5f,#feb47b);
  color:#fff;
  cursor:pointer;
}
</style>
</head>

<body>
<div class="container">
<h1>软膜灯箱门头设计 · AI提示词生成器</h1>

<div class="form-box">
<input id="industry" placeholder="行业">
<input id="name" placeholder="品牌名称">
<input id="slogan" placeholder="标语">
<input id="color" placeholder="主色调">
<button onclick="generate()">生成20组提示词</button>
</div>

<div class="result" id="result"></div>
</div>

<script>
function generate(){
  let industry=document.getElementById("industry").value;
  let name=document.getElementById("name").value;
  let slogan=document.getElementById("slogan").value;
  let color=document.getElementById("color").value;

  let container=document.getElementById("result");
  container.innerHTML="";

  let styles=[
    "极简现代风","轻奢质感风","高级灰设计","潮流街头风","科技未来风",
    "日式简约风","国潮复古风","工业风设计","网红打卡风","高端商务风",
    "温馨暖色风","清新自然风","高对比视觉风","品牌感设计","艺术展陈风",
    "夜景灯光强化","冷淡风设计","高级黑风格","暖光氛围风","极致简洁风"
  ];

  for(let i=0;i<20;i++){
    let prompt=`${styles[i]}，白天自然光，门头完整正立面展示，正面平视视角，画面居中对称构图，无透视畸变，无裁切，无倾斜，无任何遮挡，门头宽度完整呈现，单层灯箱门头设计，底部整体为无边框软膜灯箱（材质：UV软膜，边缘无金属包边，无收边条，灯箱表面平整通透），上方安装立体发光字及品牌Logo（附着于软膜灯箱表面，采用隐形固定结构），结构符合实际施工标准，行业为${industry}，品牌名称“${name}”，主营品类清晰展示，搭配标语“${slogan}”，字体现代简洁，灯光效果为灯箱整体柔和发光，发光字高亮立体发光，整体配色为${color}，8K高清，商业写实效果图，细节真实可施工，禁止墙面出现灯箱`;

    let card=document.createElement("div");
    card.className="card";

    card.innerHTML=`
      <p>${prompt}</p>
      <button class="copy-btn" onclick="copyText(this)">复制</button>
    `;

    container.appendChild(card);
  }
}

function copyText(btn){
  let text=btn.parentElement.innerText.replace("复制","");
  navigator.clipboard.writeText(text);
  btn.innerText="已复制";
  setTimeout(()=>{btn.innerText="复制"},3000);
}
</script>
</body>
</html>
