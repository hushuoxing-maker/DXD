<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>古月 · 灯箱发光字门头AI智能体</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft YaHei",sans-serif;}

body{
  min-height:100vh;
  background: linear-gradient(270deg,#0f2027,#2c5364,#1c1c3c,#0f2027);
  background-size:600% 600%;
  animation:bgMove 18s ease infinite;
  color:#fff;
}

@keyframes bgMove{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* 顶部 */
header{
  text-align:center;
  padding:60px 20px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(20px);
}

header h1{
  font-size:36px;
  background:linear-gradient(90deg,#00dbde,#fc00ff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

header p{
  opacity:0.7;
  margin-top:10px;
}

/* 主体 */
main{
  max-width:1200px;
  margin:30px auto;
  padding:0 20px;
}

/* 输入 */
.input-box{
  display:flex;
  gap:20px;
  margin-bottom:30px;
}

.input-box input{
  flex:1;
  padding:16px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,0.2);
  background:rgba(255,255,255,0.05);
  color:#fff;
  outline:none;
}

.input-box input:focus{
  border-color:#00dbde;
  box-shadow:0 0 12px rgba(0,219,222,0.6);
}

/* 按钮 */
button{
  padding:16px 34px;
  border:none;
  border-radius:14px;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
  color:#fff;
  background:linear-gradient(270deg,#ff00cc,#3333ff,#00dbde);
  background-size:400% 400%;
  animation:btnMove 6s ease infinite;
}

@keyframes btnMove{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

button:hover{
  transform:translateY(-3px) scale(1.05);
}

/* 卡片 */
.results{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(360px,1fr));
  gap:24px;
}

.card{
  position:relative;
  padding:22px;
  border-radius:18px;
  background:rgba(255,255,255,0.06);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.08);
  box-shadow:0 10px 40px rgba(0,0,0,0.5);
  aspect-ratio:4/3;
}

/* 霓虹边框 */
.card::before{
  content:"";
  position:absolute;
  inset:0;
  border-radius:18px;
  padding:1px;
  background:linear-gradient(135deg,#00dbde,#fc00ff,#00dbde);
  -webkit-mask:
    linear-gradient(#fff 0 0) content-box,
    linear-gradient(#fff 0 0);
  -webkit-mask-composite:xor;
}

/* 文本 */
.card pre{
  font-size:13px;
  line-height:1.6;
  white-space:pre-wrap;
}

/* 复制 */
.copy{
  position:absolute;
  top:10px;
  right:10px;
  padding:6px 12px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:linear-gradient(135deg,#00dbde,#fc00ff);
  color:#fff;
}

.copy.ok{background:#2ecc71;}

@media(max-width:768px){
  .input-box{flex-direction:column;}
}
</style>
</head>

<body>

<header>
  <h1>古月 · 灯箱发光字门头AI智能体</h1>
  <p>合作伙伴专用｜20组可施工商业门头方案</p>
</header>

<main>

<div class="input-box">
  <input id="industry" placeholder="输入行业，例如：火锅店 / 美容院 / 烧烤店">
  <button onclick="generate()">生成20组</button>
</div>

<div class="results" id="list"></div>

</main>

<script>

const prefixes=["壹号","金牌","匠心","老街","盛世","东方","本味","百味","御品","拾光"];
const suffixes=["馆","坊","中心","小厨","工坊","餐厅","空间","料理","生活馆"];
const slogans=["地道风味","现做现卖","匠心制作","每日新鲜","品质优选","口碑爆款","人气推荐"];

function pick(arr){return arr[Math.floor(Math.random()*arr.length)]}

function combo(arr,n){
  let copy=[...arr],res=[];
  for(let i=0;i<n;i++){
    let idx=Math.floor(Math.random()*copy.length);
    res.push(copy[idx]);
    copy.splice(idx,1);
  }
  return res.join("、");
}

function generate(){
  let industry=document.getElementById("industry").value || "餐饮店";
  let box=document.getElementById("list");
  box.innerHTML="";

  let used=new Set();
  let i=0;

  while(i<20){

    let name=pick(prefixes)+industry+pick(suffixes);
    let slogan=pick(slogans);
    let color=combo(["暖白","黑金","深蓝","高级灰","奶油色","原木色"],2);

    let prompt=`白天自然光，门头正立面，完整展示，正面平视视角，无透视畸变，无任何遮挡，灯箱发光字门头设计，底层整体软膜灯箱结构，上层立体发光字设计，行业为${industry}，品牌名称“${name}”，主营品类清晰展示，搭配标语“${slogan}”，字体现代简洁，材质采用软膜灯箱、无边框灯箱、UV软膜、亚克力背光字、不锈钢精工字、迷你发光字、金属包边，灯光表现为日间灯箱整体柔和发光，发光字高亮立体发光效果，整体配色为${color}，8K高清，商业写实效果图，细节丰富，色彩自然，可直接施工参考，禁止墙面出现灯箱`;

    if(!used.has(prompt)){
      used.add(prompt);

      let card=document.createElement("div");
      card.className="card";

      let pre=document.createElement("pre");
      pre.innerText=prompt;

      let btn=document.createElement("button");
      btn.className="copy";
      btn.innerText="复制";

      btn.onclick=()=>{
        navigator.clipboard.writeText(prompt);
        btn.innerText="已复制";
        btn.classList.add("ok");
        setTimeout(()=>{
          btn.innerText="复制";
          btn.classList.remove("ok");
        },2000);
      }

      card.appendChild(pre);
      card.appendChild(btn);
      box.appendChild(card);

      i++;
    }
  }
}

</script>

</body>
</html>
