<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>古月 · 灯箱发光字门头AI智能体 Pro版</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft YaHei",sans-serif;}

body{
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  min-height:100vh;
  color:#fff;
}

.container{
  max-width:1200px;
  margin:auto;
  padding:30px;
}

h1{
  text-align:center;
  margin-bottom:30px;
  font-size:28px;
  background:linear-gradient(90deg,#00f5ff,#7efff5,#00ff87);
  -webkit-background-clip:text;
  color:transparent;
}

.form-box{
  background:rgba(255,255,255,0.05);
  padding:20px;
  border-radius:15px;
  backdrop-filter:blur(10px);
  margin-bottom:30px;
}

input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border:none;
  border-radius:8px;
  outline:none;
}

button{
  width:100%;
  padding:12px;
  background:linear-gradient(90deg,#00c6ff,#0072ff);
  border:none;
  border-radius:10px;
  color:#fff;
  font-size:16px;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:scale(1.03);
}

.result{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(520px,1fr));
  gap:20px;
}

.card{
  background:rgba(255,255,255,0.05);
  padding:20px;
  border-radius:15px;
  backdrop-filter:blur(8px);
  position:relative;
}

.card p{
  font-size:13px;
  line-height:1.6;
  margin-bottom:10px;
}

.copy-btn{
  position:absolute;
  right:15px;
  bottom:15px;
  padding:6px 12px;
  font-size:12px;
  border:none;
  border-radius:6px;
  background:linear-gradient(90deg,#ff7e5f,#feb47b);
  color:#fff;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container">
<h1>古月 · 灯箱发光字门头AI智能体器</h1>

<div class="form-box">
<input id="industry" placeholder="输入行业（如：餐饮 / 炸鸡 / 火锅）">
<input id="name" placeholder="品牌名称">
<input id="slogan" placeholder="标语">
<input id="color" placeholder="主色调（如：红色 / 黑金 / 橙色）">
<button onclick="generate()">生成20组提示词</button>
</div>

<div class="result" id="result"></div>
</div>

<script>
function generate(){
  let industry=document.getElementById("industry").value;
  let name=document.getElementById("name").value;
  let slogan=document.getElementById("slogan").value;
  let color=document.getElementById("color").value;

  let container=document.getElementById("result");
  container.innerHTML="";

  let styles=[
    "极简现代风","轻奢质感风","高级灰设计","潮流街头风","科技未来风",
    "日式简约风","国潮复古风","工业风设计","网红打卡风","高端商务风",
    "温馨暖色风","清新自然风","高对比视觉风","品牌感设计","艺术展陈风",
    "夜景灯光强化","冷淡风设计","高级黑风格","暖光氛围风","极致简洁风"
  ];

  for(let i=0;i<20;i++){

    let prompt=`${styles[i]}，白天自然光，门头正立面，完整展示，正面平视视角，无透视畸变，无任何遮挡，灯箱发光字门头设计，整体为单层结构，底部为整体软膜灯箱门头，灯箱表面干净简洁，上方安装立体发光字与品牌logo（附着式安装于灯箱表面，采用金属支架或预埋固定结构），结构符合商业门头实际施工标准，行业为${industry}，品牌名称“${name}”，主营品类清晰展示，搭配标语“${slogan}”，字体现代简洁，材质采用软膜灯箱、无边框灯箱、UV软膜、亚克力背光字、不锈钢精工字、迷你发光字、金属包边，灯光表现为日间灯箱整体均匀柔和发光，发光字高亮立体发光效果，整体配色为${color}，8K高清，商业写实效果图，细节真实可施工，禁止墙面出现灯箱`;

    let card=document.createElement("div");
    card.className="card";

    card.innerHTML=`
      <p>${prompt}</p>
      <button class="copy-btn" onclick="copyText(this)">复制</button>
    `;

    container.appendChild(card);
  }
}

function copyText(btn){
  let text=btn.parentElement.innerText.replace("复制","");
  navigator.clipboard.writeText(text);
  btn.innerText="已复制";
  setTimeout(()=>{btn.innerText="复制"},3000);
}
</script>

</body>
</html>
